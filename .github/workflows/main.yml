name: Live Market Dashboard Autopilot

on:
  schedule:
    # Triggers every 15 minutes, 24 hours a day, 5 days a week (Mon-Fri)
    - cron: '*/15 * * * 1-5'
  workflow_dispatch:
    # Keeps your manual trigger button active so you can test it anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Hybrid POI and EMA Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
