name: Hourly Forex Alerts

on:
  schedule:
    # Runs every hour on the hour, Monday to Friday
    - cron: '0 * * * 1-5'
  workflow_dispatch: # Allows you to click a button and test it manually anytime

jobs:
  run-forex-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Copy files from GitHub repository
      uses: actions/checkout@v4

    - name: Ready up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install required internet tools
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run the Bot Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py
      
